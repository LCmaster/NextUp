name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: backend/go.sum

    - name: Build Backend
      working-directory: ./backend
      run: go build -v ./cmd/server

    - name: Test Backend
      working-directory: ./backend
      run: go test -v ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint

    - name: Check Svelte
      working-directory: ./frontend
      run: npm run check

    - name: Unit Tests
      working-directory: ./frontend
      run: npm run test:unit
